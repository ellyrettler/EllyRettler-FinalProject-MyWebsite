    <header class="site-header">

    <nav>
        <ul class="nav-list">
            <li><a href="index.html">Home</a></li>
            <li><a href="about.html">About</a></li>

    <main>
        <div class="book-template-wrapper">
            <div class="book-card-detail">

                <!-- Back button -->
                <a href="browse.html" class="back-arrow" title="Back to Browse">&#8592;</a>

                <!-- Top: cover + meta -->
                <div class="book-top">

                    <!-- Replace the placeholder div with an <img> when you have a real cover -->
                    <div class="book-cover">Book Image</div>

                    <div class="book-meta">
                        <div class="book-title">Book Title</div>
                        <div class="book-author">Author</div>

                        <div class="book-stats">
                            <div class="book-stat">Rating: <span></span></div>
                            <div class="book-stat">Pages: <span></span></div>
                            <div class="book-stat">Genre: <span></span></div>
                            <div class="book-stat">POV: <span></span></div>
                        </div>
                    </div>
                </div>

                <hr class="book-divider">

                <!-- Details / blurb -->
                <div class="book-section-label">Details:</div>
                <div class="book-section-body">
                    Book blurb goes here. 
                </div>

                <!-- Personal notes -->
                <div class="book-section-label">Personal Notes:</div>
                <div class="book-section-body">
                    My Peronal notes
                </div>

            </div>
        </div>
